<!DOCTYPE html>
<html>
<head>
    <title>InMyPDF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center">InMyPDF</h3>

        <input type="file" id="pdf" class="form-control my-3">
        <button class="btn btn-primary w-100" onclick="uploadPDF()">Upload PDF</button>

        <div id="uploadStatus" class="alert d-none mt-3"></div>

        <input type="text" id="question" class="form-control my-3" placeholder="Ask a question">
        <button class="btn btn-success w-100" onclick="askQuestion()">Ask</button>

        <div id="answerBox" class="alert alert-info d-none mt-3"></div>
    </div>
</div>
